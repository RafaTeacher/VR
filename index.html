<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>A-Frame Quest - Demo aula</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      // Component per fer clic amb el controlador (raycaster) i activar accions
      AFRAME.registerComponent("clickable", {
        init: function () {
          this.el.classList.add("clickable");
        }
      });

      // Mini-quiz: mostra pregunta i comprova resposta. Si és correcte, activa el "portal".
      AFRAME.registerComponent("quiz-gate", {
        schema: {
          correct: { type: "string", default: "A" } // A, B o C
        },
        init: function () {
          const el = this.el;
          const correct = this.data.correct;

          const panel = document.querySelector("#quizPanel");
          const feedback = document.querySelector("#quizFeedback");
          const portal = document.querySelector("#portal");

          // Quan cliques l'objecte del quiz, es mostra el panell
          el.addEventListener("click", () => {
            panel.setAttribute("visible", true);
            feedback.setAttribute("value", "");
          });

          // Respostes
          ["A", "B", "C"].forEach(letter => {
            const btn = document.querySelector("#btn" + letter);
            btn.addEventListener("click", () => {
              if (letter === correct) {
                feedback.setAttribute("value", "✅ Correcte! Pots avançar.");
                portal.setAttribute("visible", true);
                panel.setAttribute("visible", false);
              } else {
                feedback.setAttribute("value", "❌ No és correcte. Torna-ho a provar.");
              }
            });
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene background="color: #1b1b1b">
      <!-- Assets (models) -->
      <a-assets>
        <!-- Canvia els noms pels teus .glb -->
        <a-asset-item id="obj1" src="assets/models/objecte1.glb"></a-asset-item>
        <a-asset-item id="obj2" src="assets/models/objecte2.glb"></a-asset-item>
      </a-assets>

      <!-- Llum -->
      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="1 3 2"></a-entity>

      <!-- Terra -->
      <a-plane rotation="-90 0 0" width="20" height="20" color="#2a2a2a"></a-plane>

      <!-- Cámara + controls (VR) -->
      <a-entity id="rig" position="0 0 3">
        <a-entity camera position="0 1.6 0"></a-entity>

        <!-- Controladors (raycaster per apuntar i clicar) -->
        <a-entity
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 20"
        ></a-entity>
        <a-entity
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 20"
        ></a-entity>
      </a-entity>

      <!-- Objecte 3D #1 + cartell info -->
      <a-entity gltf-model="#obj1" position="-1 0 -2" rotation="0 30 0" scale="1 1 1"></a-entity>
      <a-plane position="-1 1.4 -2" width="1.6" height="0.8" color="#111" opacity="0.85"></a-plane>
      <a-text
        value="Objecte 1\nInfo: aquí hi poses una descripció curta."
        position="-1 1.65 -1.99"
        width="2.2"
        align="center"
        color="#fff"
      ></a-text>

      <!-- Objecte 3D #2: serà el “punt de quiz” -->
      <a-entity
        id="quizObject"
        gltf-model="#obj2"
        position="1 0 -2"
        rotation="0 -20 0"
        scale="1 1 1"
        clickable
        quiz-gate="correct: B"
      ></a-entity>

      <!-- Indicació sobre l'objecte del quiz -->
      <a-text
        value="👉 Clica aquest objecte per fer el quiz"
        position="1 1.4 -2"
        width="2.5"
        align="center"
        color="#ffd54a"
      ></a-text>

      <!-- Panell del quiz (inicialment amagat) -->
      <a-entity id="quizPanel" visible="false" position="0 1.6 -1.2">
        <a-plane width="2.4" height="1.6" color="#000" opacity="0.85"></a-plane>

        <a-text
          value="PREGUNTA:\nQuina opció és correcta?"
          position="0 0.55 0.01"
          width="2.2"
          align="center"
          color="#fff"
        ></a-text>

        <!-- Botons A/B/C -->
        <a-plane id="btnA" class="clickable" position="-0.7 -0.1 0.01" width="0.6" height="0.35" color="#333"></a-plane>
        <a-text value="A" position="-0.7 -0.1 0.02" align="center" color="#fff"></a-text>

        <a-plane id="btnB" class="clickable" position="0 -0.1 0.01" width="0.6" height="0.35" color="#333"></a-plane>
        <a-text value="B" position="0 -0.1 0.02" align="center" color="#fff"></a-text>

        <a-plane id="btnC" class="clickable" position="0.7 -0.1 0.01" width="0.6" height="0.35" color="#333"></a-plane>
        <a-text value="C" position="0.7 -0.1 0.02" align="center" color="#fff"></a-text>

        <a-text
          id="quizFeedback"
          value=""
          position="0 -0.6 0.02"
          width="2.2"
          align="center"
          color="#fff"
        ></a-text>
      </a-entity>

      <!-- “Portal” (bloquejat fins encertar) -->
      <a-cylinder
        id="portal"
        visible="false"
        position="0 1 -5"
        radius="0.8"
        height="2"
        color="#4caf50"
        opacity="0.6"
      ></a-cylinder>
      <a-text
        value="PORTAL DESBLOQUEJAT"
        position="0 2.3 -5"
        align="center"
        color="#4caf50"
        width="4"
        visible="true"
      ></a-text>
    </a-scene>
  </body>
</html>
