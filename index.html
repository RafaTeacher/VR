<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>A-Frame Quest - Objectes + Quiz progressiu</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      /*
        Estructura esperada:
        /
          index.html
          data/
            objects.json
            obj01.json
            obj02.json
          assets/
            models/
              objecte1.glb
              objecte2.glb

        Exemple d'obj01.json:
        {
          "id": "obj01",
          "title": "Cub de prova",
          "model": "assets/models/objecte1.glb",
          "position": [0, 0, -2],
          "rotation": [0, 25, 0],
          "scale": [1, 1, 1],
          "description": "Descripció de l'objecte.",
          "question": "Pregunta de prova?",
          "answers": ["Resposta A", "Resposta B", "Resposta C", "Resposta D"],
          "correctIndex": 1,
          "hint": "Pista breu."
        }
      */

      AFRAME.registerComponent("clickable", {
        init: function () {
          this.el.classList.add("clickable");
        }
      });

      window.addEventListener("load", () => {
        const scene = document.querySelector("a-scene");
        const assetsEl = document.querySelector("a-assets");
        const rigEl = document.querySelector("#rig");
        const camEl = document.querySelector("#cam");

        const toastEl = document.querySelector("#toast");
        const progressEl = document.querySelector("#progress");

        const panelEl = document.querySelector("#panel");
        const panelBackEl = document.querySelector("#panelBack");
        const titleEl = document.querySelector("#panelTitle");
        const descEl = document.querySelector("#panelDesc");
        const qEl = document.querySelector("#panelQuestion");
        const answersEl = document.querySelector("#answers");
        const feedbackEl = document.querySelector("#feedback");
        const manipEl = document.querySelector("#manipControls");

        const finalPanelEl = document.querySelector("#finalPanel");
        const finalTextEl = document.querySelector("#finalText");

        let objects = [];
        let currentIndex = 0;

        let startTimeMs = 0;
        let endTimeMs = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let totalAttempts = 0;

        function showToast(text, ms = 1800) {
          toastEl.setAttribute("value", text);
          toastEl.setAttribute("visible", "true");
          setTimeout(() => toastEl.setAttribute("visible", "false"), ms);
        }

        function formatTime(ms) {
          const totalSeconds = Math.max(0, Math.round(ms / 1000));
          const minutes = Math.floor(totalSeconds / 60);
          const seconds = totalSeconds % 60;
          return `${minutes} min ${String(seconds).padStart(2, "0")} s`;
        }

        function calculateScore() {
          const elapsedSec = Math.max(1, Math.round((endTimeMs - startTimeMs) / 1000));

          // Fórmula simple i entenedora per a classe:
          // 100 punts inicials
          // -8 per errada
          // -1 punt per cada 30 segons
          const errorPenalty = wrongCount * 8;
          const timePenalty = Math.floor(elapsedSec / 30);
          const score = Math.max(0, 100 - errorPenalty - timePenalty);

          return { score, elapsedSec, errorPenalty, timePenalty };
        }

        function setProgress() {
          const total = objects.length;
          const shownIndex = Math.min(currentIndex + 1, total);
          progressEl.setAttribute(
            "value",
            `Objecte ${shownIndex} / ${total} · Encerts: ${correctCount} · Errades: ${wrongCount}`
          );
        }

        function setFeedback(msg, color = "#ffffff") {
          feedbackEl.setAttribute("value", msg);
          feedbackEl.setAttribute("color", color);
        }

        function clearAnswers() {
          while (answersEl.firstChild) answersEl.removeChild(answersEl.firstChild);
        }

        function clearManipControls() {
          while (manipEl.firstChild) manipEl.removeChild(manipEl.firstChild);
        }

        function getCurrentObjectEntity() {
          return document.querySelector(`[data-obj-index="${currentIndex}"]`);
        }

        function placePanelNearObject(index) {
          const obj = objects[index];
          if (!obj) return;

          const [ox, oy, oz] = obj.position || [0, 0, -2];
          const desired = new THREE.Vector3(ox, oy + 1.45, oz);

          const camPos = camEl.object3D.getWorldPosition(new THREE.Vector3());
          const dir = desired.clone().sub(camPos);

          if (dir.length() < 0.0001) dir.set(0, 0, -1);
          dir.normalize();

          // Panell una mica més lluny perquè ara és més gran.
          const dist = 2.35;
          const finalPos = camPos.clone().add(dir.multiplyScalar(dist));

          panelEl.object3D.position.copy(finalPos);
          panelEl.object3D.lookAt(camPos);

          // Panell més gran que la versió anterior, però sense estar enganxat a la cara.
          panelEl.setAttribute("scale", "1 1 1");
          panelEl.setAttribute("visible", "true");
        }

        function placeFinalPanel() {
          const camPos = camEl.object3D.getWorldPosition(new THREE.Vector3());
          const forward = new THREE.Vector3(0, 0, -1);
          forward.applyQuaternion(camEl.object3D.getWorldQuaternion(new THREE.Quaternion()));
          forward.normalize();

          const finalPos = camPos.clone().add(forward.multiplyScalar(2.4));
          finalPanelEl.object3D.position.copy(finalPos);
          finalPanelEl.object3D.lookAt(camPos);
          finalPanelEl.setAttribute("visible", "true");
        }

        function focusOnObject(index) {
          const obj = objects[index];
          if (!obj || !obj.position) return;

          const x = obj.position[0];
          const z = obj.position[2];

          rigEl.setAttribute("position", `${x} 0 ${z + 2.8}`);
        }

        function showOnlyCurrentObject() {
          objects.forEach((_, i) => {
            const ent = document.querySelector(`[data-obj-index="${i}"]`);
            if (!ent) return;

            const isCurrentOrCompleted = i <= currentIndex;
            const isCurrent = i === currentIndex;

            // Només l'objecte actual és visible.
            // Els completats s'amaguen per centrar l'activitat en l'objecte nou.
            ent.setAttribute("visible", isCurrent ? "true" : "false");

            const label = ent.querySelector(".obj-label");
            if (label) {
              label.setAttribute("visible", isCurrent ? "true" : "false");
              label.setAttribute("color", "#ffd54a");
            }

            const halo = ent.querySelector(".current-halo");
            if (halo) halo.setAttribute("visible", isCurrent ? "true" : "false");
          });
        }

        function makeButton({ text, x, y, w, h, onClick, color = "#2b2b2b", textColor = "#ffffff", textWidth = 1.8 }) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} ${y} 0.03`);
          btn.setAttribute("width", String(w));
          btn.setAttribute("height", String(h));
          btn.setAttribute("color", color);
          btn.setAttribute("opacity", "0.96");
          btn.setAttribute("clickable", "");

          const label = document.createElement("a-text");
          label.setAttribute("value", text);
          label.setAttribute("align", "center");
          label.setAttribute("baseline", "center");
          label.setAttribute("width", String(textWidth));
          label.setAttribute("color", textColor);
          label.setAttribute("position", "0 0 0.01");

          btn.appendChild(label);
          btn.addEventListener("click", onClick);
          return btn;
        }

        function rotateCurrentObject(axis, degrees) {
          const ent = getCurrentObjectEntity();
          if (!ent) return;

          const rot = ent.getAttribute("rotation");
          const next = {
            x: rot.x,
            y: rot.y,
            z: rot.z
          };

          next[axis] += degrees;
          ent.setAttribute("rotation", `${next.x} ${next.y} ${next.z}`);
        }

        function createManipulationControls() {
          clearManipControls();

          const controls = [
            { text: "⟲ Girar esquerra", x: -0.63, y: 0.00, axis: "y", deg: 25 },
            { text: "Girar dreta ⟳", x:  0.63, y: 0.00, axis: "y", deg: -25 },
            { text: "Inclinar amunt", x: -0.63, y: -0.25, axis: "x", deg: 20 },
            { text: "Inclinar avall", x:  0.63, y: -0.25, axis: "x", deg: -20 }
          ];

          controls.forEach((c) => {
            const btn = makeButton({
              text: c.text,
              x: c.x,
              y: c.y,
              w: 1.16,
              h: 0.20,
              textWidth: 2.1,
              color: "#17324d",
              onClick: () => rotateCurrentObject(c.axis, c.deg)
            });
            manipEl.appendChild(btn);
          });
        }

        function showCorrectAnimation() {
          const ent = getCurrentObjectEntity();

          setFeedback("✅ Correcte!", "#74ff7a");

          // Text gran en l'espai, damunt de l'objecte.
          if (ent) {
            const ok = document.createElement("a-text");
            ok.setAttribute("value", "✅ Correcte!");
            ok.setAttribute("align", "center");
            ok.setAttribute("width", "4");
            ok.setAttribute("color", "#74ff7a");
            ok.setAttribute("position", "0 2.1 0");
            ok.setAttribute("side", "double");
            ok.setAttribute(
              "animation__rise",
              "property: position; from: 0 1.8 0; to: 0 2.5 0; dur: 900; easing: easeOutQuad"
            );
            ok.setAttribute(
              "animation__fade",
              "property: text.opacity; from: 1; to: 0; dur: 900; easing: linear"
            );

            ent.appendChild(ok);

            // Petita animació de celebració a l'objecte actual.
            const rot = ent.getAttribute("rotation");
            ent.setAttribute(
              "animation__correctspin",
              `property: rotation; from: ${rot.x} ${rot.y} ${rot.z}; to: ${rot.x} ${rot.y + 360} ${rot.z}; dur: 900; easing: easeOutQuad`
            );

            setTimeout(() => {
              if (ok.parentNode) ok.parentNode.removeChild(ok);
              ent.removeAttribute("animation__correctspin");
            }, 1000);
          }
        }

        function finishQuiz() {
          endTimeMs = Date.now();
          panelEl.setAttribute("visible", "false");

          objects.forEach((_, i) => {
            const ent = document.querySelector(`[data-obj-index="${i}"]`);
            if (ent) ent.setAttribute("visible", "false");
          });

          const { score, elapsedSec, errorPenalty, timePenalty } = calculateScore();

          finalTextEl.setAttribute(
            "value",
            [
              "🎉 Activitat completada!",
              "",
              `Puntuació final: ${score} / 100`,
              `Temps: ${formatTime(endTimeMs - startTimeMs)}`,
              `Encerts: ${correctCount}`,
              `Errades: ${wrongCount}`,
              `Intents totals: ${totalAttempts}`,
              "",
              `Penalització per errades: -${errorPenalty}`,
              `Penalització per temps: -${timePenalty}`,
              "",
              "Podeu tornar a carregar la pàgina per repetir l'activitat."
            ].join("\n")
          );

          placeFinalPanel();
          setProgress();
        }

        function advanceToNextObject() {
          currentIndex += 1;
          setProgress();

          if (currentIndex < objects.length) {
            focusOnObject(currentIndex);
            showOnlyCurrentObject();
            showToast(`➡️ Nou objecte: ${objects[currentIndex].title || "Següent"}`);
            showPanelFor(currentIndex);
          } else {
            finishQuiz();
          }
        }

        function showPanelFor(index) {
          const obj = objects[index];
          if (!obj) return;

          titleEl.setAttribute("value", obj.title || `Objecte ${index + 1}`);
          descEl.setAttribute("value", obj.description || "");
          qEl.setAttribute("value", `PREGUNTA:\n${obj.question || ""}`);

          setFeedback("");
          clearAnswers();
          createManipulationControls();

          placePanelNearObject(index);

          const answers = (obj.answers || []).slice(0, 4);
          const correctIndex = Number(obj.correctIndex ?? 0);

          // Botons més grans i amb més espai per a text.
          const positions = [
            { x: -0.66, y:  0.15 },
            { x:  0.66, y:  0.15 },
            { x: -0.66, y: -0.17 },
            { x:  0.66, y: -0.17 }
          ];

          answers.forEach((txt, i) => {
            const p = positions[i] || { x: 0, y: -0.17 };

            const btn = makeButton({
              text: txt,
              x: p.x,
              y: p.y,
              w: 1.20,
              h: 0.27,
              textWidth: 2.25,
              color: "#2b2b2b",
              onClick: () => {
                if (index !== currentIndex) {
                  setFeedback("ℹ️ Aquest no és l’objecte actual.", "#ffffff");
                  return;
                }

                totalAttempts += 1;

                if (i === correctIndex) {
                  correctCount += 1;
                  setProgress();
                  showCorrectAnimation();

                  // Evitem dobles clics mentre avança.
                  panelEl.querySelectorAll(".clickable").forEach((el) => el.classList.remove("clickable"));

                  setTimeout(() => {
                    advanceToNextObject();
                  }, 1300);
                } else {
                  wrongCount += 1;
                  setProgress();

                  const hint = obj.hint ? `\nPista: ${obj.hint}` : "";
                  setFeedback("❌ Incorrecte. Torna-ho a provar." + hint, "#ffb3b3");
                }
              }
            });

            answersEl.appendChild(btn);
          });
        }

        function addModelAsset(id, src) {
          const item = document.createElement("a-asset-item");
          item.setAttribute("id", id);
          item.setAttribute("src", src);
          assetsEl.appendChild(item);
        }

        function addObjectEntity(obj, index) {
          const e = document.createElement("a-entity");
          e.setAttribute("gltf-model", `#${obj.assetId}`);
          e.setAttribute("data-obj-index", String(index));
          e.setAttribute("clickable", "");
          e.setAttribute("shadow", "cast: true; receive: false");
          e.setAttribute("visible", "false");

          const p = obj.position || [0, 0, -2];
          const r = obj.rotation || [0, 0, 0];
          const s = obj.scale || [1, 1, 1];

          e.setAttribute("position", `${p[0]} ${p[1]} ${p[2]}`);
          e.setAttribute("rotation", `${r[0]} ${r[1]} ${r[2]}`);
          e.setAttribute("scale", `${s[0]} ${s[1]} ${s[2]}`);

          // Etiqueta flotant
          const label = document.createElement("a-text");
          label.classList.add("obj-label");
          label.setAttribute("value", obj.title || `Objecte ${index + 1}`);
          label.setAttribute("align", "center");
          label.setAttribute("width", "3.2");
          label.setAttribute("color", "#ffd54a");
          label.setAttribute("position", "0 1.45 0");
          label.setAttribute("side", "double");

          // Halo/indicador de l'objecte actiu.
          const halo = document.createElement("a-torus");
          halo.classList.add("current-halo");
          halo.setAttribute("position", "0 0.06 0");
          halo.setAttribute("rotation", "90 0 0");
          halo.setAttribute("radius", "0.85");
          halo.setAttribute("radius-tubular", "0.012");
          halo.setAttribute("color", "#ffd54a");
          halo.setAttribute("visible", "false");
          halo.setAttribute(
            "animation__pulse",
            "property: scale; from: 1 1 1; to: 1.12 1.12 1.12; dir: alternate; dur: 700; loop: true; easing: easeInOutSine"
          );

          e.appendChild(label);
          e.appendChild(halo);

          // Clic sobre l'objecte: obre el panell només si és l'actual.
          e.addEventListener("click", () => {
            if (index === currentIndex) {
              showPanelFor(index);
            }
          });

          scene.appendChild(e);
        }

        async function loadData() {
          const listResp = await fetch("data/objects.json");
          if (!listResp.ok) throw new Error("No puc llegir data/objects.json");

          const fileList = await listResp.json();

          const loaded = [];
          for (const file of fileList) {
            const resp = await fetch(`data/${file}`);
            if (!resp.ok) throw new Error(`No puc llegir data/${file}`);
            loaded.push(await resp.json());
          }

          objects = loaded.map((o, i) => ({
            id: o.id ?? `obj${String(i + 1).padStart(2, "0")}`,
            title: o.title ?? `Objecte ${i + 1}`,
            model: o.model,
            position: o.position ?? [0, 0, -2 - i * 3.0],
            rotation: o.rotation ?? [0, 0, 0],
            scale: o.scale ?? [1, 1, 1],
            description: o.description ?? "",
            question: o.question ?? "",
            answers: o.answers ?? [],
            correctIndex: o.correctIndex ?? 0,
            hint: o.hint ?? "",
            assetId: `asset_${i}`
          }));

          objects.forEach((obj) => addModelAsset(obj.assetId, obj.model));
          objects.forEach((obj, i) => addObjectEntity(obj, i));

          startTimeMs = Date.now();
          currentIndex = 0;
          correctCount = 0;
          wrongCount = 0;
          totalAttempts = 0;

          setProgress();
          focusOnObject(0);
          showOnlyCurrentObject();

          showToast("👋 Observa l’objecte, gira’l si cal i respon la pregunta.", 2600);
          showPanelFor(0);
        }

        loadData().catch((err) => {
          console.error(err);
          showToast("❌ Error carregant dades. Revisa la consola.");
        });
      });
    </script>
  </head>

  <body>
    <a-scene background="color: #1b1b1b">
      <a-assets></a-assets>

      <!-- Llum + terra -->
      <a-entity light="type: ambient; intensity: 0.75"></a-entity>
      <a-entity light="type: directional; intensity: 0.85" position="1 3 2"></a-entity>
      <a-plane rotation="-90 0 0" width="30" height="30" color="#2a2a2a"></a-plane>

      <!-- Panell principal: més gran i amb botons més amples -->
      <a-entity id="panel" visible="false">
        <a-plane id="panelBack" width="2.15" height="1.65" color="#000" opacity="0.88"></a-plane>

        <a-text
          id="panelTitle"
          value=""
          position="0 0.70 0.01"
          width="2.05"
          align="center"
          color="#ffd54a"
        ></a-text>

        <a-text
          id="panelDesc"
          value=""
          position="0 0.48 0.01"
          width="2.05"
          align="center"
          color="#ffffff"
        ></a-text>

        <a-text
          id="panelQuestion"
          value=""
          position="0 0.27 0.01"
          width="2.05"
          align="center"
          color="#ffffff"
        ></a-text>

        <!-- Respostes -->
        <a-entity id="answers" position="0 -0.12 0.01"></a-entity>

        <!-- Controls per manipular/girar l'objecte -->
        <a-text
          value="Manipula l'objecte:"
          position="0 -0.52 0.02"
          width="1.9"
          align="center"
          color="#cfe8ff"
        ></a-text>
        <a-entity id="manipControls" position="0 -0.65 0.01"></a-entity>

        <a-text
          id="feedback"
          value=""
          position="0 -0.87 0.02"
          width="2.0"
          align="center"
          color="#ffffff"
        ></a-text>
      </a-entity>

      <!-- Panell final de puntuació -->
      <a-entity id="finalPanel" visible="false">
        <a-plane width="2.4" height="1.65" color="#000" opacity="0.90"></a-plane>
        <a-text
          id="finalText"
          value=""
          position="0 0.15 0.02"
          width="2.15"
          align="center"
          color="#ffffff"
        ></a-text>
      </a-entity>

      <!-- Rig + càmera + HUD petit -->
      <a-entity id="rig" position="0 0 3">
        <a-entity id="cam" camera position="0 1.6 0">
          <a-entity id="hud" position="0 0 -1.2">
            <a-text
              id="toast"
              value=""
              position="0 0.85 0"
              width="2.6"
              align="center"
              color="#ffffff"
              visible="false"
            ></a-text>

            <a-text
              id="progress"
              value="Objecte 0 / 0"
              position="0 0.65 0"
              width="2.7"
              align="center"
              color="#cccccc"
            ></a-text>
          </a-entity>
        </a-entity>

        <!-- Controladors. El cursor és necessari perquè Quest Browser generi l'event click amb el trigger. -->
        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>

        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
