<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>A-Frame Quest - Quiz 3D tipus Kahoot</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      /*
        Estructura esperada del projecte:

        /
          index.html
          data/
            objects.json
            obj01.json
            obj02.json
          assets/
            models/
              objecte1.glb
              objecte2.glb

        data/objects.json:
        [
          "obj01.json",
          "obj02.json"
        ]

        Exemple data/obj01.json:
        {
          "id": "obj01",
          "title": "Cub de prova",
          "model": "assets/models/objecte1.glb",
          "scale": [1, 1, 1],
          "rotation": [0, 25, 0],
          "description": "Observa la figura i respon.",
          "question": "Quin format recomanat fem servir a A-Frame per models 3D?",
          "answers": ["STL", "GLB/GLTF", "DOCX", "MP3"],
          "correctIndex": 1,
          "hint": "És un format pensat per web i temps real."
        }
      */

      AFRAME.registerComponent("clickable", {
        init: function () {
          this.el.classList.add("clickable");
        }
      });

      window.addEventListener("load", () => {
        const assetsEl = document.querySelector("a-assets");

        const modelEl = document.querySelector("#modelEntity");
        const modelTitleEl = document.querySelector("#modelTitle");

        const quizTitleEl = document.querySelector("#quizTitle");
        const questionEl = document.querySelector("#questionText");
        const descriptionEl = document.querySelector("#descriptionText");
        const answersEl = document.querySelector("#answers");
        const hintPanelEl = document.querySelector("#hintPanel");
        const hintTextEl = document.querySelector("#hintText");
        const progressEl = document.querySelector("#progressText");
        const feedbackPanelEl = document.querySelector("#feedbackPanel");
        const feedbackTextEl = document.querySelector("#feedbackText");

        const finalPanelEl = document.querySelector("#finalPanel");
        const finalTextEl = document.querySelector("#finalText");

        let objects = [];
        let currentIndex = 0;

        let startTimeMs = 0;
        let questionStartMs = 0;
        let totalWrong = 0;
        let totalAttempts = 0;
        let questionTimes = [];
        let locked = false;

        function addModelAsset(id, src) {
          const item = document.createElement("a-asset-item");
          item.setAttribute("id", id);
          item.setAttribute("src", src);
          assetsEl.appendChild(item);
        }

        function clearChildren(el) {
          while (el.firstChild) el.removeChild(el.firstChild);
        }

        function formatTime(ms) {
          const totalSeconds = Math.max(0, Math.round(ms / 1000));
          const min = Math.floor(totalSeconds / 60);
          const sec = totalSeconds % 60;
          return `${min}:${String(sec).padStart(2, "0")}`;
        }

        function updateProgress() {
          const total = objects.length;
          progressEl.setAttribute(
            "value",
            `Pregunta ${Math.min(currentIndex + 1, total)} / ${total}     Errades: ${totalWrong}`
          );
        }

        function hideHint() {
          hintPanelEl.setAttribute("visible", "false");
          hintTextEl.setAttribute("value", "");
        }

        function showHint(text) {
          hintTextEl.setAttribute("value", text);
          hintPanelEl.setAttribute("visible", "true");
        }

        function showFeedback(text, color = "#74ff7a") {
          feedbackTextEl.setAttribute("value", text);
          feedbackTextEl.setAttribute("color", color);
          feedbackPanelEl.setAttribute("visible", "true");

          feedbackPanelEl.removeAttribute("animation__pop");
          feedbackPanelEl.setAttribute(
            "animation__pop",
            "property: scale; from: 0.75 0.75 0.75; to: 1 1 1; dur: 250; easing: easeOutBack"
          );
        }

        function hideFeedback() {
          feedbackPanelEl.setAttribute("visible", "false");
        }

        function makeAnswerButton(text, index, x, y, color) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} ${y} 0.04`);
          btn.setAttribute("width", "1.95");
          btn.setAttribute("height", "0.48");
          btn.setAttribute("color", color);
          btn.setAttribute("opacity", "0.96");
          btn.setAttribute("clickable", "");
          btn.classList.add("answer-button");

          const label = document.createElement("a-text");
          label.setAttribute("value", `${index + 1}. ${text}`);
          label.setAttribute("align", "center");
          label.setAttribute("baseline", "center");
          label.setAttribute("width", "3.55");
          label.setAttribute("wrap-count", "34");
          label.setAttribute("color", "#ffffff");
          label.setAttribute("position", "0 0 0.02");

          btn.appendChild(label);

          // Diversos events per fer-ho més robust a Quest Browser.
          const handler = () => answer(index);
          btn.addEventListener("click", handler);
          btn.addEventListener("mouseup", handler);

          return btn;
        }

        function createAnswers(obj) {
          clearChildren(answersEl);

          const answers = (obj.answers || []).slice(0, 4);

          // 2x2 estil Kahoot, molt més gran.
          const positions = [
            { x: -1.05, y:  0.32, color: "#b71c1c" },
            { x:  1.05, y:  0.32, color: "#0d47a1" },
            { x: -1.05, y: -0.28, color: "#1b5e20" },
            { x:  1.05, y: -0.28, color: "#e65100" }
          ];

          answers.forEach((txt, i) => {
            const p = positions[i];
            answersEl.appendChild(makeAnswerButton(txt, i, p.x, p.y, p.color));
          });
        }

        function calculateScore(totalTimeMs) {
          const total = objects.length || 1;
          const correct = total; // per arribar al final, totes s'han encertat almenys una vegada.
          const avgQuestionTimeSec =
            questionTimes.length > 0
              ? questionTimes.reduce((a, b) => a + b, 0) / questionTimes.length / 1000
              : 0;

          // Puntuació senzilla:
          // Base 100.
          // -10 punts per errada.
          // -1 punt per cada 20 segons totals.
          // -petita penalització si el temps mitjà per pregunta és alt.
          const errorPenalty = totalWrong * 10;
          const totalTimePenalty = Math.floor(totalTimeMs / 20000);
          const avgPenalty = Math.floor(avgQuestionTimeSec / 20);
          const score = Math.max(0, Math.min(100, 100 - errorPenalty - totalTimePenalty - avgPenalty));

          return {
            score,
            correct,
            total,
            totalWrong,
            totalAttempts,
            totalTimePenalty,
            errorPenalty,
            avgPenalty,
            avgQuestionTimeSec
          };
        }

        function finishQuiz() {
          locked = true;

          const totalTimeMs = Date.now() - startTimeMs;
          const result = calculateScore(totalTimeMs);

          document.querySelector("#mainStage").setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "true");

          finalTextEl.setAttribute(
            "value",
            [
              "ACTIVITAT COMPLETADA",
              "",
              `Puntuació: ${result.score} / 100`,
              `Temps total: ${formatTime(totalTimeMs)}`,
              `Encerts finals: ${result.correct} / ${result.total}`,
              `Errades: ${result.totalWrong}`,
              `Intents totals: ${result.totalAttempts}`,
              "",
              `Penalització errades: -${result.errorPenalty}`,
              `Penalització temps: -${result.totalTimePenalty}`,
              "",
              "Recarrega la pàgina per tornar a començar."
            ].join("\n")
          );
        }

        function loadQuestion(index) {
          locked = false;
          hideHint();
          hideFeedback();

          const obj = objects[index];
          if (!obj) return;

          modelEl.setAttribute("gltf-model", `#${obj.assetId}`);
          modelEl.setAttribute("scale", (obj.scale || [1, 1, 1]).join(" "));
          modelEl.setAttribute("rotation", (obj.rotation || [0, 0, 0]).join(" "));
          modelEl.setAttribute("visible", "true");

          // Reinicia animacions anteriors.
          modelEl.removeAttribute("animation__correct");
          modelEl.removeAttribute("animation__idle");
          modelEl.setAttribute(
            "animation__idle",
            "property: rotation; dur: 16000; easing: linear; loop: true; to: 0 360 0"
          );

          modelTitleEl.setAttribute("value", obj.title || `Objecte ${index + 1}`);

          quizTitleEl.setAttribute("value", obj.title || `Objecte ${index + 1}`);
          descriptionEl.setAttribute("value", obj.description || "");
          questionEl.setAttribute("value", obj.question || "");

          createAnswers(obj);
          updateProgress();

          questionStartMs = Date.now();
        }

        function answer(selectedIndex) {
          if (locked) return;

          const obj = objects[currentIndex];
          if (!obj) return;

          const correctIndex = Number(obj.correctIndex ?? 0);
          totalAttempts += 1;

          if (selectedIndex === correctIndex) {
            locked = true;

            const elapsedThisQuestion = Date.now() - questionStartMs;
            questionTimes.push(elapsedThisQuestion);

            showFeedback("✓ CORRECTE!", "#74ff7a");
            hideHint();

            modelEl.removeAttribute("animation__idle");
            const currentRot = modelEl.getAttribute("rotation");
            modelEl.setAttribute(
              "animation__correct",
              `property: rotation; from: ${currentRot.x} ${currentRot.y} ${currentRot.z}; to: ${currentRot.x} ${currentRot.y + 360} ${currentRot.z}; dur: 950; easing: easeOutQuad`
            );

            setTimeout(() => {
              currentIndex += 1;

              if (currentIndex >= objects.length) {
                finishQuiz();
              } else {
                loadQuestion(currentIndex);
              }
            }, 1250);
          } else {
            totalWrong += 1;
            updateProgress();

            const hint = obj.hint
              ? `Pista: ${obj.hint}`
              : "Pista: observa bé la figura i torna-ho a provar.";

            showHint(hint);
            showFeedback("✕ RESPOSTA INCORRECTA", "#ffb3b3");

            setTimeout(() => {
              if (!locked) hideFeedback();
            }, 900);
          }
        }

        function rotateObject(axis, amount) {
          const r = modelEl.getAttribute("rotation");
          const next = { x: r.x, y: r.y, z: r.z };
          next[axis] += amount;

          modelEl.removeAttribute("animation__idle");
          modelEl.setAttribute("rotation", `${next.x} ${next.y} ${next.z}`);
        }

        function makeControlButton(text, x, y, axis, amount) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} ${y} 0.04`);
          btn.setAttribute("width", "0.88");
          btn.setAttribute("height", "0.28");
          btn.setAttribute("color", "#263238");
          btn.setAttribute("opacity", "0.96");
          btn.setAttribute("clickable", "");

          const label = document.createElement("a-text");
          label.setAttribute("value", text);
          label.setAttribute("align", "center");
          label.setAttribute("baseline", "center");
          label.setAttribute("width", "1.65");
          label.setAttribute("wrap-count", "18");
          label.setAttribute("color", "#ffffff");
          label.setAttribute("position", "0 0 0.02");

          btn.appendChild(label);

          const handler = () => rotateObject(axis, amount);
          btn.addEventListener("click", handler);
          btn.addEventListener("mouseup", handler);

          return btn;
        }

        function createRotationControls() {
          const controls = document.querySelector("#rotationControls");
          clearChildren(controls);

          controls.appendChild(makeControlButton("⟲ esquerra", -0.98, 0, "y", 25));
          controls.appendChild(makeControlButton("dreta ⟳", -0.03, 0, "y", -25));
          controls.appendChild(makeControlButton("amunt", 0.92, 0, "x", 20));
          controls.appendChild(makeControlButton("avall", 1.87, 0, "x", -20));
        }

        async function loadData() {
          const listResp = await fetch("data/objects.json");
          if (!listResp.ok) throw new Error("No puc llegir data/objects.json");

          const fileList = await listResp.json();

          const loaded = [];
          for (const file of fileList) {
            const resp = await fetch(`data/${file}`);
            if (!resp.ok) throw new Error(`No puc llegir data/${file}`);
            loaded.push(await resp.json());
          }

          objects = loaded.map((o, i) => ({
            id: o.id ?? `obj${String(i + 1).padStart(2, "0")}`,
            title: o.title ?? `Objecte ${i + 1}`,
            model: o.model,
            rotation: o.rotation ?? [0, 0, 0],
            scale: o.scale ?? [1, 1, 1],
            description: o.description ?? "",
            question: o.question ?? "",
            answers: o.answers ?? [],
            correctIndex: o.correctIndex ?? 0,
            hint: o.hint ?? "",
            assetId: `asset_${i}`
          }));

          objects.forEach((obj) => addModelAsset(obj.assetId, obj.model));

          createRotationControls();

          startTimeMs = Date.now();
          currentIndex = 0;
          totalWrong = 0;
          totalAttempts = 0;
          questionTimes = [];

          loadQuestion(0);
        }

        loadData().catch((err) => {
          console.error(err);
          hintTextEl.setAttribute("value", "Error carregant dades. Revisa data/objects.json i els fitxers objXX.json.");
          hintPanelEl.setAttribute("visible", "true");
        });
      });
    </script>
  </head>

  <body>
    <a-scene background="color: #111111">
      <a-assets></a-assets>

      <!-- Llum -->
      <a-entity light="type: ambient; intensity: 0.85"></a-entity>
      <a-entity light="type: directional; intensity: 0.9" position="0 4 2"></a-entity>

      <!-- Escenari principal: només hi ha UNA figura i UNA interfície gran -->
      <a-entity id="mainStage" position="0 0 -3.2">

        <!-- Objecte 3D únic, reutilitzat per a cada pregunta -->
        <a-entity id="modelArea" position="0 1.55 0">
          <a-entity id="modelEntity" visible="false" position="0 0 0"></a-entity>

          <a-text
            id="modelTitle"
            value=""
            position="0 1.35 0.02"
            width="4.2"
            align="center"
            color="#ffd54a"
            side="double"
          ></a-text>

          <a-torus
            position="0 -0.72 0"
            rotation="90 0 0"
            radius="0.95"
            radius-tubular="0.012"
            color="#ffd54a"
            animation__pulse="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; dir: alternate; dur: 800; loop: true; easing: easeInOutSine"
          ></a-torus>
        </a-entity>

        <!-- Controls de gir: molt separats del quiz -->
        <a-entity id="rotationBar" position="-0.45 0.32 0.02">
          <a-plane width="4.05" height="0.42" color="#000000" opacity="0.55"></a-plane>
          <a-entity id="rotationControls" position="0 0 0.03"></a-entity>
        </a-entity>

        <!-- Panell de pregunta, gran i tipus Kahoot -->
        <a-entity id="quizPanel" position="0 -0.48 0">
          <a-plane width="4.45" height="2.35" color="#000000" opacity="0.88"></a-plane>

          <a-text
            id="progressText"
            value=""
            position="0 1.02 0.03"
            width="4.2"
            align="center"
            color="#cccccc"
          ></a-text>

          <a-text
            id="quizTitle"
            value=""
            position="0 0.78 0.03"
            width="4.1"
            align="center"
            color="#ffd54a"
          ></a-text>

          <a-text
            id="descriptionText"
            value=""
            position="0 0.55 0.03"
            width="4.1"
            wrap-count="60"
            align="center"
            color="#ffffff"
          ></a-text>

          <a-text
            id="questionText"
            value=""
            position="0 0.25 0.03"
            width="4.1"
            wrap-count="52"
            align="center"
            color="#ffffff"
          ></a-text>

          <!-- Botons grans 2x2 -->
          <a-entity id="answers" position="0 -0.40 0.03"></a-entity>
        </a-entity>

        <!-- Pistes separades dels botons -->
        <a-entity id="hintPanel" position="0 -1.86 0" visible="false">
          <a-plane width="4.45" height="0.42" color="#3a2200" opacity="0.94"></a-plane>
          <a-text
            id="hintText"
            value=""
            position="0 0 0.03"
            width="4.15"
            wrap-count="65"
            align="center"
            baseline="center"
            color="#ffecb3"
          ></a-text>
        </a-entity>

        <!-- Feedback separat i gran -->
        <a-entity id="feedbackPanel" position="0 2.55 0.05" visible="false">
          <a-plane width="2.4" height="0.55" color="#000000" opacity="0.78"></a-plane>
          <a-text
            id="feedbackText"
            value=""
            position="0 0 0.04"
            width="2.2"
            align="center"
            baseline="center"
            color="#ffffff"
          ></a-text>
        </a-entity>
      </a-entity>

      <!-- Panell final -->
      <a-entity id="finalPanel" position="0 1.35 -3.0" visible="false">
        <a-plane width="4.3" height="2.6" color="#000000" opacity="0.92"></a-plane>
        <a-text
          id="finalText"
          value=""
          position="0 0.20 0.04"
          width="3.9"
          wrap-count="58"
          align="center"
          color="#ffffff"
        ></a-text>
      </a-entity>

      <!-- Càmera i controladors -->
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 1.6 0">
          <!-- Cursor de mirada de suport: útil si el trigger dels comandaments falla.
               Mira un botó i prem/clica segons el navegador. -->
          <a-cursor
            id="gazeCursor"
            raycaster="objects: .clickable"
            fuse="false"
            material="color: white; shader: flat"
            geometry="primitive: ring; radiusInner: 0.006; radiusOuter: 0.010"
          ></a-cursor>
        </a-entity>

        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>

        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
