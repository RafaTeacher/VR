<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz 3D tipus Kahoot</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script>
      AFRAME.registerComponent("clickable", {
        init: function () { this.el.classList.add("clickable"); }
      });

      window.addEventListener("load", () => {
        const FONT_URL =
          "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-400-normal.woff";

        const loadingPanelEl  = document.querySelector("#loadingPanel");
        const loadingTextEl   = document.querySelector("#loadingText");
        const modelRootEl     = document.querySelector("#modelRoot");
        const questionEl      = document.querySelector("#questionText");
        const progressEl      = document.querySelector("#progressText");
        const answersEl       = document.querySelector("#answers");
        const hintPanelEl     = document.querySelector("#hintPanel");
        const hintTextEl      = document.querySelector("#hintText");
        const feedbackPanelEl = document.querySelector("#feedbackPanel");
        const feedbackTextEl  = document.querySelector("#feedbackText");
        const finalPanelEl    = document.querySelector("#finalPanel");
        const finalTextEl     = document.querySelector("#finalText");
        const stageEl         = document.querySelector("#mainStage");
        const modelWarningEl  = document.querySelector("#modelWarningText");
        const restartBtnEl    = document.querySelector("#restartBtn");
        const restartBtnText  = document.querySelector("#restartBtnText");

        /* Text del botó de reinici */
        setTimeout(() => {
          setTroika(restartBtnText, "↺  Tornar a començar", {
            align: "center", anchor: "center", fontSize: 0.105, maxWidth: 2.4, color: "#ffffff"
          });
          const handler = () => {
            restartBtnEl.setAttribute("visible", "false");
            finalPanelEl.setAttribute("visible", "false");
            loadData();
          };
          restartBtnEl.addEventListener("click",   handler);
          restartBtnEl.addEventListener("mouseup", handler);
        }, 500);

        let objects            = [];
        let modelWrappers      = [];
        let currentIndex       = 0;
        let startTimeMs        = 0;
        let totalWrong         = 0;
        let totalAttempts      = 0;
        let locked             = false;

        /* Puntuació per velocitat (estil Kahoot) */
        let totalScore         = 0;
        let questionStartTimeMs = 0;
        let wrongsThisQuestion  = 0;

        const MAX_PTS_PER_Q   = 1000;  // punts màxims per pregunta
        const SPEED_LIMIT_MS  = 20000; // finestra de velocitat (20 s)

        /* ────────────────────────────────────────────────────────
           Utilitats generals
        ──────────────────────────────────────────────────────── */
        function setTroika(el, value, extra = {}) {
          el.setAttribute("troika-text", Object.assign(
            { value, color: "#ffffff", font: FONT_URL }, extra
          ));
        }

        function setLoadingText(value) {
          setTroika(loadingTextEl, value, {
            align: "center", anchor: "center",
            fontSize: 0.12, maxWidth: 3.8, lineHeight: 1.2
          });
        }

        function clearChildren(el) {
          while (el.firstChild) el.removeChild(el.firstChild);
        }

        function formatTime(ms) {
          const s = Math.max(0, Math.round(ms / 1000));
          return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
        }

        /* Espera n fotogrames de renderització (evita problemes de timing amb Three.js) */
        function waitFrames(n) {
          return new Promise(resolve => {
            let count = 0;
            function tick() { if (++count >= n) resolve(); else requestAnimationFrame(tick); }
            requestAnimationFrame(tick);
          });
        }

        /* ────────────────────────────────────────────────────────
           Progrés, pista i feedback
        ──────────────────────────────────────────────────────── */
        function updateProgress() {
          setTroika(progressEl,
            `Pregunta ${Math.min(currentIndex + 1, objects.length)} / ${objects.length}   ·   Punts: ${totalScore}   ·   Errades: ${totalWrong}`,
            { align: "center", anchor: "center", fontSize: 0.068, maxWidth: 4.5, color: "#a0b4cf" }
          );
        }

        function setModelWarning(value) {
          setTroika(modelWarningEl, value, {
            align: "center", anchor: "center", fontSize: 0.07, maxWidth: 3.9, color: "#ffcc80"
          });
        }

        function hideHint() {
          hintPanelEl.setAttribute("visible", "false");
          setTroika(hintTextEl, "", { align: "center", anchor: "center", fontSize: 0.075, maxWidth: 3.9 });
        }

        function showHint(text) {
          setTroika(hintTextEl, text, {
            align: "center", anchor: "center",
            fontSize: 0.075, maxWidth: 4.3, lineHeight: 1.15, color: "#ffe9a0"
          });
          hintPanelEl.setAttribute("visible", "true");
        }

        function hideFeedback() { feedbackPanelEl.setAttribute("visible", "false"); }

        function showFeedback(text, color = "#74ff7a", duration = 1400) {
          setTroika(feedbackTextEl, text, {
            align: "center", anchor: "center", fontSize: 0.105, maxWidth: 2.4, color
          });
          feedbackPanelEl.setAttribute("visible", "true");
          feedbackPanelEl.removeAttribute("animation__pop");
          feedbackPanelEl.setAttribute(
            "animation__pop",
            "property: scale; from: 0.82 0.82 0.82; to: 1 1 1; dur: 230; easing: easeOutBack"
          );
          if (duration > 0) setTimeout(() => { if (!locked) hideFeedback(); }, duration);
        }

        /* ────────────────────────────────────────────────────────
           Botons de resposta
        ──────────────────────────────────────────────────────── */
        function createTextOnButton(btn, text, fontSize = 0.090) {
          const textEl = document.createElement("a-entity");
          textEl.setAttribute("position", "0 0 0.03");
          setTroika(textEl, text, {
            align: "center", anchor: "center",
            fontSize, maxWidth: 1.88, lineHeight: 1.08, color: "#ffffff"
          });
          btn.appendChild(textEl);
        }

        function makeAnswerButton(text, index, x, y, color) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} ${y} 0.05`);
          btn.setAttribute("width",  "2.12");
          btn.setAttribute("height", "0.52");
          btn.setAttribute("color",  color);
          btn.setAttribute("opacity", "0.97");
          btn.setAttribute("clickable", "");
          btn.classList.add("answer-button");
          createTextOnButton(btn, `${index + 1}. ${text}`);
          const handler = () => answer(index);
          btn.addEventListener("click",    handler);
          btn.addEventListener("mouseup",  handler);
          return btn;
        }

        function createAnswers(obj) {
          clearChildren(answersEl);
          const answers = (obj.answers || []).slice(0, 4);
          const positions = [
            { x: -1.09, y:  0.30, color: "#b71c1c" },
            { x:  1.09, y:  0.30, color: "#0d47a1" },
            { x: -1.09, y: -0.28, color: "#1b5e20" },
            { x:  1.09, y: -0.28, color: "#e65100" }
          ];
          answers.forEach((txt, i) => {
            const p = positions[i];
            answersEl.appendChild(makeAnswerButton(txt, i, p.x, p.y, p.color));
          });
        }

        /* ────────────────────────────────────────────────────────
           Normalització del model 3D
           
           FIX 1: calcula el bounding box en l'ESPAI LOCAL del model
                  (recorrent les matrius locals dels fills), de manera
                  que és independent de la posició/rotació dels pares
                  (mainStage, modelArea, etc.) i funciona fins i tot
                  quan l'escena és visible=false durant la precàrrega.
           
           FIX 2: centrat correcte que té en compte el factor d'escala.
        ──────────────────────────────────────────────────────── */
        function normalizeModel(wrapper, modelEntity, obj) {
          const box = new THREE.Box3();

          modelEntity.object3D.traverse(child => {
            if ((child.isMesh || child.isSkinnedMesh) && child.geometry) {
              /* Assegurem que el bounding box de la geometria estigui calculat */
              if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();

              /* Construïm la matriu del fill RELATIVA a modelEntity.object3D
                 concatenant les matrius locals en la cadena de pares */
              const relMat = new THREE.Matrix4().identity();
              let curr = child;
              while (curr && curr !== modelEntity.object3D) {
                relMat.premultiply(curr.matrix);
                curr = curr.parent;
              }

              /* Unim la caixa del fill (en espai local de modelEntity) */
              box.union(child.geometry.boundingBox.clone().applyMatrix4(relMat));
            }
          });

          if (box.isEmpty()) {
            console.warn("[normalizeModel] Bounding box buit per:", obj.model);
            return false;
          }

          const size   = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxDim = Math.max(size.x, size.y, size.z);
          if (!isFinite(maxDim) || maxDim <= 0.0001) {
            console.warn("[normalizeModel] Model sense geometria vàlida:", obj.model);
            return false;
          }

          const TARGET   = 2.05;
          const userSca  = obj.scale || [1, 1, 1];
          const userMult = Math.max(userSca[0] || 1, userSca[1] || 1, userSca[2] || 1);
          const factor   = (TARGET / maxDim) * userMult;

          /*
            Centrem el model: en espai local de modelEntity, el centre de
            la geometria és 'center'. Després d'escalar, cada punt queda a
            factor·v. Perquè el centre acabi a l'origen del wrapper cal que:
              position + factor·center = 0  →  position = -factor·center
          */
          modelEntity.object3D.position.set(
            -center.x * factor,
            -center.y * factor,
            -center.z * factor
          );
          modelEntity.object3D.scale.set(factor, factor, factor);
          return true;
        }

        /* ────────────────────────────────────────────────────────
           Càrrega de models
        ──────────────────────────────────────────────────────── */
        function loadOneModel(obj, index, total) {
          return new Promise((resolve) => {
            setLoadingText(`Carregant models 3D...\n${index + 1} / ${total}\n${obj.model}`);

            const wrapper = document.createElement("a-entity");
            wrapper.setAttribute("id",       `modelWrapper_${index}`);
            wrapper.setAttribute("visible",  "false");
            wrapper.setAttribute("position", "0 0 0");
            wrapper.setAttribute("rotation", (obj.rotation || [0, 0, 0]).join(" "));

            const modelEntity = document.createElement("a-entity");
            modelEntity.setAttribute("gltf-model", `url(${obj.model})`);
            modelEntity.setAttribute("visible", "true");

            wrapper.appendChild(modelEntity);
            modelRootEl.appendChild(wrapper);

            const timeout = setTimeout(() => {
              console.warn("Timeout carregant model:", obj.model);
              modelWrappers[index] = wrapper;
              resolve({ ok: false, error: "timeout", wrapper });
            }, 15000);

            modelEntity.addEventListener("model-loaded", async () => {
              clearTimeout(timeout);

              /*
                FIX: esperem 2 fotogrames perquè Three.js acabes d'annexar
                totes les geometries de les malles GLTF al graf de l'escena
                abans de calcular el bounding box.
              */
              await waitFrames(2);
              const ok = normalizeModel(wrapper, modelEntity, obj);

              /* Reintent si el primer intento falla (per exemple, model complex) */
              if (!ok) {
                await waitFrames(5);
                normalizeModel(wrapper, modelEntity, obj);
              }

              modelWrappers[index] = wrapper;
              resolve({ ok: true, wrapper });
            });

            modelEntity.addEventListener("model-error", (e) => {
              clearTimeout(timeout);
              console.warn("Error carregant model:", obj.model, e);
              modelWrappers[index] = wrapper;
              resolve({ ok: false, error: "model-error", wrapper });
            });
          });
        }

        async function preloadAllModels() {
          clearChildren(modelRootEl);
          modelWrappers = [];

          for (let i = 0; i < objects.length; i++) {
            await loadOneModel(objects[i], i, objects.length);
          }

          /*
            Passada final de normalització: tots els models ja són al DOM
            i el graf Three.js és complet. Útil si algun va fallar al primer intent.
          */
          await waitFrames(3);
          for (let i = 0; i < objects.length; i++) {
            const w = modelWrappers[i];
            if (w) {
              const me = w.querySelector("[gltf-model]");
              if (me) normalizeModel(w, me, objects[i]);
            }
          }

          setLoadingText("Models carregats.\nComencem!");
          await new Promise(resolve => setTimeout(resolve, 650));
        }

        /* ────────────────────────────────────────────────────────
           Visibilitat i animació dels models
        ──────────────────────────────────────────────────────── */
        function hideAllModels() {
          modelWrappers.forEach(w => {
            if (w) {
              w.setAttribute("visible", "false");
              w.removeAttribute("animation__idle");
              w.removeAttribute("animation__correct");
            }
          });
        }

        function showCurrentModel(index) {
          hideAllModels();

          const wrapper     = modelWrappers[index];
          const obj         = objects[index];

          if (!wrapper) {
            setModelWarning(`No s'ha trobat el model ${index + 1}.`);
            return;
          }

          wrapper.setAttribute("visible", "true");

          /* Re-normalitzem en el moment de mostrar per capturar qualsevol
             cas que hagi fallat durant la precàrrega. */
          const modelEntity = wrapper.querySelector("[gltf-model]");
          if (modelEntity) normalizeModel(wrapper, modelEntity, obj);

          const initRot = obj.rotation || [0, 0, 0];
          wrapper.setAttribute("rotation", initRot.join(" "));
          wrapper.removeAttribute("animation__idle");
          wrapper.removeAttribute("animation__correct");

          /*
            FIX: especifiquem 'from' i 'to' explícitament per evitar
            comportaments estranys quan la rotació inicial no és [0,0,0].
            La Y augmenta +360 perquè la rotació sigui sempre en el
            mateix sentit i sense salts.
          */
          wrapper.setAttribute(
            "animation__idle",
            `property: rotation; ` +
            `from: ${initRot[0]} ${initRot[1]} ${initRot[2]}; ` +
            `to: ${initRot[0]} ${initRot[1] + 360} ${initRot[2]}; ` +
            `dur: 19000; easing: linear; loop: true`
          );

          setModelWarning("");
        }

        /* ────────────────────────────────────────────────────────
           Lògica del quiz
        ──────────────────────────────────────────────────────── */
        /*
          Puntuació estil Kahoot per a una pregunta:
          - Base: MAX_PTS_PER_Q si s'encerta del primer intent
          - Bonus de velocitat: fins al 50% addicional si es respon
            en menys de SPEED_LIMIT_MS des que apareix la pregunta
          - Cada intent fallit previ a la resposta correcta redueix
            la base un 30% acumulatiu (màxim fins a 0)
        */
        function scoreForQuestion(elapsedMs, wrongsBefore) {
          const speedRatio  = Math.max(0, 1 - elapsedMs / SPEED_LIMIT_MS);
          const speedBonus  = Math.round(MAX_PTS_PER_Q * 0.5 * speedRatio);
          const errorFactor = Math.pow(0.70, wrongsBefore);
          const base        = Math.round(MAX_PTS_PER_Q * errorFactor);
          return base + speedBonus;
        }

        function finishQuiz() {
          locked = true;
          const totalTimeMs  = Date.now() - startTimeMs;
          const maxPossible  = objects.length * MAX_PTS_PER_Q;
          const pct          = maxPossible > 0 ? Math.round((totalScore / maxPossible) * 100) : 0;

          let rating = "⭐";
          if (pct >= 90) rating = "🏆 Excel·lent!";
          else if (pct >= 70) rating = "🥇 Molt bé!";
          else if (pct >= 50) rating = "🥈 Bé";
          else rating = "🥉 Segueix practicant";

          stageEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "true");

          setTroika(
            finalTextEl,
            [
              "ACTIVITAT COMPLETADA",
              rating,
              "",
              `Puntuació total: ${totalScore} / ${maxPossible}`,
              `Percentatge: ${pct}%`,
              `Temps total: ${formatTime(totalTimeMs)}`,
              `Errades totals: ${totalWrong}`,
              `Intents totals: ${totalAttempts}`,
            ].join("\n"),
            {
              align: "center", anchor: "center",
              fontSize: 0.105, maxWidth: 3.8, lineHeight: 1.18, color: "#ffffff"
            }
          );

          /* Botó de tornar a començar */
          const restartBtn = document.querySelector("#restartBtn");
          restartBtn.setAttribute("visible", "true");
        }

        function answer(selectedIndex) {
          if (locked) return;

          const obj = objects[currentIndex];
          if (!obj) return;

          const correctIndex = Number(obj.correctIndex ?? 0);
          totalAttempts += 1;

          if (selectedIndex === correctIndex) {
            locked = true;
            hideHint();

            /* Càlcul de punts per a aquesta pregunta */
            const elapsed = Date.now() - questionStartTimeMs;
            const pts     = scoreForQuestion(elapsed, wrongsThisQuestion);
            totalScore   += pts;

            const timeStr = (elapsed / 1000).toFixed(1);
            showFeedback(`✓ CORRECTE  +${pts} pts\n⏱ ${timeStr}s`, "#74ff7a", 0);
            updateProgress();

            const wrapper = modelWrappers[currentIndex];
            if (wrapper) {
              const currentRot = wrapper.getAttribute("rotation");
              wrapper.removeAttribute("animation__idle");
              wrapper.setAttribute(
                "animation__correct",
                `property: rotation; ` +
                `from: ${currentRot.x} ${currentRot.y} ${currentRot.z}; ` +
                `to: ${currentRot.x} ${currentRot.y + 360} ${currentRot.z}; ` +
                `dur: 1100; easing: easeOutQuad`
              );
            }

            setTimeout(() => {
              currentIndex += 1;
              if (currentIndex >= objects.length) finishQuiz();
              else loadQuestion(currentIndex);
            }, 2200);

          } else {
            wrongsThisQuestion += 1;
            totalWrong         += 1;
            updateProgress();
            showFeedback("✕ RESPOSTA INCORRECTA", "#ffb3b3", 1300);
            showHint(
              obj.hint
                ? `Pista: ${obj.hint}`
                : "Pista: observa millor la figura i torna-ho a provar."
            );
          }
        }

        function loadQuestion(index) {
          locked              = false;
          wrongsThisQuestion  = 0;
          questionStartTimeMs = Date.now();
          hideHint();
          hideFeedback();

          const obj = objects[index];
          if (!obj) return;

          showCurrentModel(index);

          setTroika(questionEl, obj.question || "", {
            align: "center", anchor: "center",
            fontSize: 0.105, maxWidth: 4.2, lineHeight: 1.1, color: "#ffffff"
          });

          createAnswers(obj);
          updateProgress();
        }

        /* ────────────────────────────────────────────────────────
           Càrrega de dades
        ──────────────────────────────────────────────────────── */
        async function loadData() {
          stageEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "false");
          loadingPanelEl.setAttribute("visible", "true");
          setLoadingText("Preparant l'activitat...");

          const listResp = await fetch("data/objects.json");
          if (!listResp.ok) throw new Error("No puc llegir data/objects.json");

          const fileList = await listResp.json();
          const loaded   = [];

          for (const file of fileList) {
            const resp = await fetch(`data/${file}`);
            if (!resp.ok) throw new Error(`No puc llegir data/${file}`);
            loaded.push(await resp.json());
          }

          objects = loaded.map((o, i) => ({
            id:           o.id          ?? `obj${String(i + 1).padStart(2, "0")}`,
            model:        o.model,
            rotation:     o.rotation   ?? [0, 0, 0],
            scale:        o.scale      ?? [1, 1, 1],
            question:     o.question   ?? "",
            answers:      o.answers    ?? [],
            correctIndex: o.correctIndex ?? 0,
            hint:         o.hint       ?? ""
          }));

          await preloadAllModels();

          loadingPanelEl.setAttribute("visible", "false");
          stageEl.setAttribute("visible", "true");

          startTimeMs        = Date.now();
          currentIndex       = 0;
          totalWrong         = 0;
          totalAttempts      = 0;
          totalScore         = 0;
          wrongsThisQuestion = 0;

          loadQuestion(0);
        }

        loadData().catch(err => {
          console.error(err);
          loadingPanelEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "true");
          setTroika(finalTextEl,
            "Error carregant dades.\nRevisa data/objects.json i els fitxers objXX.json.",
            { align: "center", anchor: "center", fontSize: 0.115, maxWidth: 3.8, color: "#ff8a80" }
          );
        });
      });
    </script>
  </head>

  <body>
    <a-scene background="color: #0a0e18">
      <a-assets timeout="30000"></a-assets>

      <!-- Il·luminació -->
      <a-entity light="type: ambient; intensity: 0.85"></a-entity>
      <a-entity light="type: directional; intensity: 1.1; castShadow: false"
                position="1 5 3"></a-entity>
      <a-entity light="type: directional; intensity: 0.4"
                position="-2 3 -1"></a-entity>

      <!-- ════════════════════════════════════════════════════════
           Pantalla de càrrega
           Centrada a l'alçada dels ulls (càmera a y=1.6)
      ════════════════════════════════════════════════════════ -->
      <a-entity id="loadingPanel" position="0 1.55 -3.6" visible="true">
        <a-plane width="4.3" height="1.6" color="#0d1117" opacity="0.95"
                 shader="flat"></a-plane>
        <!-- Accent de color blau superior -->
        <a-plane width="4.3" height="0.06" color="#2d7be5" opacity="1"
                 position="0 0.77 0.01" shader="flat"></a-plane>
        <a-entity id="loadingText" position="0 -0.05 0.04"></a-entity>
      </a-entity>

      <!-- ════════════════════════════════════════════════════════
           Escenari principal
           Posicionat a 5 m davant, al nivell del sòl.
           La càmera és a y=1.6 → el model flota per sobre (y=3.0)
           i el panell del quiz queda a l'alçada dels ulls (y≈1.1).
      ════════════════════════════════════════════════════════ -->
      <a-entity id="mainStage" position="0 0 -5.0" visible="false">

        <!-- ── Àrea del model (part superior) ─────────────────── -->
        <a-entity id="modelArea" position="0 3.05 0">

          <!-- Tots els models es carreguen aquí; es mostra un a la vegada -->
          <a-entity id="modelRoot" position="0 0 0"></a-entity>

          <!-- Avís si el model no es pot carregar -->
          <a-entity id="modelWarningText" position="0 -1.55 0.03"></a-entity>
        </a-entity>

        <!-- ── Feedback (entre model i panell) ────────────────── -->
        <a-entity id="feedbackPanel" position="0 1.72 0.08" visible="false">
          <a-plane width="3.0" height="0.48" color="#111827" opacity="0.88"
                   shader="flat"></a-plane>
          <a-entity id="feedbackText" position="0 0 0.04"></a-entity>
        </a-entity>

        <!-- ── Panell principal del quiz ──────────────────────── -->
        <!--
          Centre del panell a y=0.42 → amb alçada 2.45, ocupa:
            de y = 0.42 - 1.225 = -0.805  (part baixa)
            a   y = 0.42 + 1.225 = +1.645 (part alta ≈ nivell dels ulls)

          Elements interns (posicions relatives al centre del panell):
            progressText  → y = +1.00  (world ≈ 1.42)
            questionText  → y = +0.62  (world ≈ 1.04)
            answersEl     → y = -0.28  (world ≈ 0.14)
              files de botons: y = ±0.30 dins answersEl → world ≈ 0.44 i -0.16
        -->
        <a-entity id="quizPanel" position="0 0.42 0">

          <!-- Fons del panell -->
          <a-plane width="4.75" height="2.45" color="#0d1117" opacity="0.92"
                   shader="flat"></a-plane>

          <!-- Línia accent blava a la part superior -->
          <a-plane width="4.75" height="0.055" color="#2d7be5" opacity="1"
                   position="0 1.168 0.01" shader="flat"></a-plane>

          <!-- Separador subtil entre pregunta i respostes -->
          <a-plane width="4.3" height="0.008" color="#2a3550" opacity="0.9"
                   position="0 0.22 0.01" shader="flat"></a-plane>

          <a-entity id="progressText" position="0  1.00 0.03"></a-entity>
          <a-entity id="questionText" position="0  0.62 0.03"></a-entity>
          <a-entity id="answers"      position="0 -0.28 0.03"></a-entity>
        </a-entity>

        <!-- ── Panell de pista ─────────────────────────────────── -->
        <a-entity id="hintPanel" position="0 -1.00 0" visible="false">
          <a-plane width="4.75" height="0.44" color="#2a1800" opacity="0.95"
                   shader="flat"></a-plane>
          <!-- Línia accent ambre a la part superior de la pista -->
          <a-plane width="4.75" height="0.045" color="#f59e0b" opacity="1"
                   position="0 0.198 0.01" shader="flat"></a-plane>
          <a-entity id="hintText" position="0 -0.02 0.03"></a-entity>
        </a-entity>

      </a-entity><!-- fi #mainStage -->

      <!-- ════════════════════════════════════════════════════════
           Panell final de resultats
      ════════════════════════════════════════════════════════ -->
      <a-entity id="finalPanel" position="0 1.55 -4.4" visible="false">
        <a-plane width="4.35" height="2.65" color="#0d1117" opacity="0.95"
                 shader="flat"></a-plane>
        <a-plane width="4.35" height="0.06" color="#22c55e" opacity="1"
                 position="0 1.265 0.01" shader="flat"></a-plane>
        <a-entity id="finalText" position="0 0.22 0.04"></a-entity>

        <!-- Botó de tornar a començar -->
        <a-plane id="restartBtn"
                 width="2.6" height="0.56"
                 color="#1565c0" opacity="0.97"
                 position="0 -1.04 0.04"
                 visible="false"
                 clickable>
          <a-entity id="restartBtnText" position="0 0 0.03"></a-entity>
        </a-plane>
      </a-entity>

      <!-- ════════════════════════════════════════════════════════
           Càmera i controls (VR Meta Quest 3 + fallback PC/mòbil)
      ════════════════════════════════════════════════════════ -->
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 1.6 0">
          <a-cursor
            id="gazeCursor"
            raycaster="objects: .clickable"
            fuse="false"
            material="color: #ffffff; shader: flat"
            geometry="primitive: ring; radiusInner: 0.006; radiusOuter: 0.010"
          ></a-cursor>
        </a-entity>

        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>

        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
