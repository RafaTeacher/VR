<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz 3D tipus Kahoot</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script>
      AFRAME.registerComponent("clickable", {
        init: function () {
          this.el.classList.add("clickable");
        }
      });

      window.addEventListener("load", () => {
        const FONT_URL =
          "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-400-normal.woff";

        const assetsEl = document.querySelector("a-assets");

        const modelEl = document.querySelector("#modelEntity");
        const questionEl = document.querySelector("#questionText");
        const progressEl = document.querySelector("#progressText");
        const answersEl = document.querySelector("#answers");
        const hintPanelEl = document.querySelector("#hintPanel");
        const hintTextEl = document.querySelector("#hintText");
        const feedbackPanelEl = document.querySelector("#feedbackPanel");
        const feedbackTextEl = document.querySelector("#feedbackText");
        const finalPanelEl = document.querySelector("#finalPanel");
        const finalTextEl = document.querySelector("#finalText");
        const stageEl = document.querySelector("#mainStage");
        const controlsEl = document.querySelector("#rotationControls");

        let objects = [];
        let currentIndex = 0;
        let startTimeMs = 0;
        let questionStartMs = 0;
        let totalWrong = 0;
        let totalAttempts = 0;
        let questionTimes = [];
        let locked = false;

        function setTroika(el, value, extra = {}) {
          const base = {
            value: value,
            color: "#ffffff",
            font: FONT_URL
          };
          el.setAttribute("troika-text", Object.assign(base, extra));
        }

        function addModelAsset(id, src) {
          const item = document.createElement("a-asset-item");
          item.setAttribute("id", id);
          item.setAttribute("src", src);
          assetsEl.appendChild(item);
        }

        function clearChildren(el) {
          while (el.firstChild) el.removeChild(el.firstChild);
        }

        function formatTime(ms) {
          const totalSeconds = Math.max(0, Math.round(ms / 1000));
          const min = Math.floor(totalSeconds / 60);
          const sec = totalSeconds % 60;
          return `${min}:${String(sec).padStart(2, "0")}`;
        }

        function updateProgress() {
          const total = objects.length;
          setTroika(
            progressEl,
            `Pregunta ${Math.min(currentIndex + 1, total)} / ${total}    Errades: ${totalWrong}`,
            {
              align: "center",
              anchor: "center",
              fontSize: 0.085,
              maxWidth: 4.0,
              color: "#cfcfcf"
            }
          );
        }

        function hideHint() {
          hintPanelEl.setAttribute("visible", "false");
          setTroika(hintTextEl, "", {
            align: "center",
            anchor: "center",
            fontSize: 0.085,
            maxWidth: 4.0
          });
        }

        function showHint(text) {
          setTroika(hintTextEl, text, {
            align: "center",
            anchor: "center",
            fontSize: 0.085,
            maxWidth: 4.0,
            color: "#ffefb0"
          });
          hintPanelEl.setAttribute("visible", "true");
        }

        function hideFeedback() {
          feedbackPanelEl.setAttribute("visible", "false");
        }

        function showFeedback(text, color = "#74ff7a") {
          setTroika(feedbackTextEl, text, {
            align: "center",
            anchor: "center",
            fontSize: 0.13,
            maxWidth: 2.3,
            color: color
          });
          feedbackPanelEl.setAttribute("visible", "true");
          feedbackPanelEl.removeAttribute("animation__pop");
          feedbackPanelEl.setAttribute(
            "animation__pop",
            "property: scale; from: 0.82 0.82 0.82; to: 1 1 1; dur: 250; easing: easeOutBack"
          );
        }

        function createTextOnButton(btn, text, fontSize = 0.1) {
          const textEl = document.createElement("a-entity");
          textEl.setAttribute("position", "0 0 0.03");
          setTroika(textEl, text, {
            align: "center",
            anchor: "center",
            fontSize: fontSize,
            maxWidth: 1.65,
            lineHeight: 1.1,
            color: "#ffffff"
          });
          btn.appendChild(textEl);
        }

        function answer(selectedIndex) {
          if (locked) return;

          const obj = objects[currentIndex];
          if (!obj) return;

          const correctIndex = Number(obj.correctIndex ?? 0);
          totalAttempts += 1;

          if (selectedIndex === correctIndex) {
            locked = true;

            const elapsedThisQuestion = Date.now() - questionStartMs;
            questionTimes.push(elapsedThisQuestion);

            hideHint();
            showFeedback("✓ RESPOSTA CORRECTA", "#74ff7a");

            modelEl.removeAttribute("animation__idle");
            const currentRot = modelEl.getAttribute("rotation");
            modelEl.setAttribute(
              "animation__correct",
              `property: rotation; from: ${currentRot.x} ${currentRot.y} ${currentRot.z}; to: ${currentRot.x} ${currentRot.y + 360} ${currentRot.z}; dur: 1100; easing: easeOutQuad`
            );

            // Missatge visible més temps.
            setTimeout(() => {
              currentIndex += 1;

              if (currentIndex >= objects.length) {
                finishQuiz();
              } else {
                loadQuestion(currentIndex);
              }
            }, 2200);
          } else {
            totalWrong += 1;
            updateProgress();
            showFeedback("✕ RESPOSTA INCORRECTA", "#ffb3b3");

            const hint = obj.hint
              ? `Pista: ${obj.hint}`
              : "Pista: observa millor la figura i torna-ho a provar.";

            showHint(hint);

            setTimeout(() => {
              if (!locked) hideFeedback();
            }, 1300);
          }
        }

        function makeAnswerButton(text, index, x, y, color) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} ${y} 0.05`);
          btn.setAttribute("width", "1.95");
          btn.setAttribute("height", "0.52");
          btn.setAttribute("color", color);
          btn.setAttribute("opacity", "0.97");
          btn.setAttribute("clickable", "");
          btn.classList.add("answer-button");

          createTextOnButton(btn, `${index + 1}. ${text}`, 0.11);

          const handler = () => answer(index);
          btn.addEventListener("click", handler);
          btn.addEventListener("mouseup", handler);

          return btn;
        }

        function createAnswers(obj) {
          clearChildren(answersEl);

          const answers = (obj.answers || []).slice(0, 4);
          const positions = [
            { x: -1.05, y:  0.30, color: "#c62828" },
            { x:  1.05, y:  0.30, color: "#1565c0" },
            { x: -1.05, y: -0.30, color: "#2e7d32" },
            { x:  1.05, y: -0.30, color: "#ef6c00" }
          ];

          answers.forEach((txt, i) => {
            const p = positions[i];
            answersEl.appendChild(makeAnswerButton(txt, i, p.x, p.y, p.color));
          });
        }

        function rotateObject(axis, amount) {
          const r = modelEl.getAttribute("rotation");
          const next = { x: r.x, y: r.y, z: r.z };
          next[axis] += amount;

          modelEl.removeAttribute("animation__idle");
          modelEl.setAttribute("rotation", `${next.x} ${next.y} ${next.z}`);
        }

        function makeControlButton(text, x, axis, amount) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} 0 0.04`);
          btn.setAttribute("width", "0.95");
          btn.setAttribute("height", "0.26");
          btn.setAttribute("color", "#263238");
          btn.setAttribute("opacity", "0.97");
          btn.setAttribute("clickable", "");

          createTextOnButton(btn, text, 0.085);

          const handler = () => rotateObject(axis, amount);
          btn.addEventListener("click", handler);
          btn.addEventListener("mouseup", handler);

          return btn;
        }

        function createRotationControls() {
          clearChildren(controlsEl);
          controlsEl.appendChild(makeControlButton("⟲ esquerra", -1.55, "y", 25));
          controlsEl.appendChild(makeControlButton("dreta ⟳", -0.50, "y", -25));
          controlsEl.appendChild(makeControlButton("amunt", 0.55, "x", 20));
          controlsEl.appendChild(makeControlButton("avall", 1.60, "x", -20));
        }

        function calculateScore(totalTimeMs) {
          const totalQuestions = objects.length || 1;
          const correct = totalQuestions; // per acabar-les totes les ha encertat
          const errorPenalty = totalWrong * 10;
          const timePenalty = Math.floor(totalTimeMs / 20000); // 1 punt cada 20 s
          const score = Math.max(0, Math.min(100, 100 - errorPenalty - timePenalty));

          return {
            score,
            correct,
            totalQuestions,
            errorPenalty,
            timePenalty
          };
        }

        function finishQuiz() {
          locked = true;
          const totalTimeMs = Date.now() - startTimeMs;
          const result = calculateScore(totalTimeMs);

          stageEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "true");

          setTroika(
            finalTextEl,
            [
              "ACTIVITAT COMPLETADA",
              "",
              `Puntuació: ${result.score} / 100`,
              `Temps total: ${formatTime(totalTimeMs)}`,
              `Encerts: ${result.correct} / ${result.totalQuestions}`,
              `Errades: ${totalWrong}`,
              `Intents totals: ${totalAttempts}`,
              "",
              `Penalització per errades: -${result.errorPenalty}`,
              `Penalització per temps: -${result.timePenalty}`,
              "",
              "Recarrega la pàgina per tornar a començar."
            ].join("\n"),
            {
              align: "center",
              anchor: "center",
              fontSize: 0.11,
              maxWidth: 3.9,
              lineHeight: 1.2,
              color: "#ffffff"
            }
          );
        }

        function loadQuestion(index) {
          locked = false;
          hideHint();
          hideFeedback();

          const obj = objects[index];
          if (!obj) return;

          modelEl.setAttribute("gltf-model", `#${obj.assetId}`);
          modelEl.setAttribute("scale", (obj.scale || [1, 1, 1]).join(" "));
          modelEl.setAttribute("rotation", (obj.rotation || [0, 0, 0]).join(" "));
          modelEl.setAttribute("visible", "true");

          modelEl.removeAttribute("animation__correct");
          modelEl.removeAttribute("animation__idle");
          modelEl.setAttribute(
            "animation__idle",
            "property: rotation; dur: 18000; easing: linear; loop: true; to: 0 360 0"
          );

          // Sense títol ni descripció, només la pregunta.
          setTroika(
            questionEl,
            obj.question || "",
            {
              align: "center",
              anchor: "center",
              fontSize: 0.125,
              maxWidth: 4.0,
              lineHeight: 1.15,
              color: "#ffffff"
            }
          );

          createAnswers(obj);
          updateProgress();
          questionStartMs = Date.now();
        }

        async function loadData() {
          const listResp = await fetch("data/objects.json");
          if (!listResp.ok) throw new Error("No puc llegir data/objects.json");

          const fileList = await listResp.json();
          const loaded = [];

          for (const file of fileList) {
            const resp = await fetch(`data/${file}`);
            if (!resp.ok) throw new Error(`No puc llegir data/${file}`);
            loaded.push(await resp.json());
          }

          objects = loaded.map((o, i) => ({
            id: o.id ?? `obj${String(i + 1).padStart(2, "0")}`,
            model: o.model,
            rotation: o.rotation ?? [0, 0, 0],
            scale: o.scale ?? [1, 1, 1],
            question: o.question ?? "",
            answers: o.answers ?? [],
            correctIndex: o.correctIndex ?? 0,
            hint: o.hint ?? "",
            assetId: `asset_${i}`
          }));

          objects.forEach((obj) => addModelAsset(obj.assetId, obj.model));

          createRotationControls();

          startTimeMs = Date.now();
          currentIndex = 0;
          totalWrong = 0;
          totalAttempts = 0;
          questionTimes = [];

          loadQuestion(0);
        }

        loadData().catch((err) => {
          console.error(err);
          finalPanelEl.setAttribute("visible", "true");
          setTroika(
            finalTextEl,
            "Error carregant dades.\nRevisa data/objects.json i els fitxers objXX.json.",
            {
              align: "center",
              anchor: "center",
              fontSize: 0.12,
              maxWidth: 3.9,
              color: "#ffffff"
            }
          );
        });
      });
    </script>
  </head>

  <body>
    <a-scene background="color: #111111">
      <a-assets></a-assets>

      <a-entity light="type: ambient; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; intensity: 1.0" position="0 4 2"></a-entity>

      <!-- Escenari principal -->
      <a-entity id="mainStage" position="0 0 -4.1">

        <!-- Objecte més amunt i sense títol -->
        <a-entity id="modelArea" position="0 2.25 0">
          <a-entity id="modelEntity" visible="false" position="0 0 0"></a-entity>

          <a-torus
            position="0 -0.88 0"
            rotation="90 0 0"
            radius="0.98"
            radius-tubular="0.012"
            color="#ffd54a"
            animation__pulse="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; dir: alternate; dur: 800; loop: true; easing: easeInOutSine"
          ></a-torus>
        </a-entity>

        <!-- Barra de controls per girar l'objecte -->
        <a-entity id="rotationBar" position="0 0.85 0.02">
          <a-plane width="4.4" height="0.38" color="#000000" opacity="0.55"></a-plane>
          <a-entity id="rotationControls" position="0 0 0.03"></a-entity>
        </a-entity>

        <!-- Panell principal estil Kahoot -->
        <a-entity id="quizPanel" position="0 -0.50 0">
          <a-plane width="4.55" height="2.55" color="#000000" opacity="0.90"></a-plane>

          <a-entity id="progressText" position="0 1.03 0.03"></a-entity>
          <a-entity id="questionText" position="0 0.63 0.03"></a-entity>

          <a-entity id="answers" position="0 -0.25 0.03"></a-entity>
        </a-entity>

        <!-- Pista separada -->
        <a-entity id="hintPanel" position="0 -2.10 0" visible="false">
          <a-plane width="4.55" height="0.45" color="#3a2200" opacity="0.95"></a-plane>
          <a-entity id="hintText" position="0 0 0.03"></a-entity>
        </a-entity>

        <!-- Missatge de feedback separat -->
        <a-entity id="feedbackPanel" position="0 2.75 0.05" visible="false">
          <a-plane width="2.9" height="0.58" color="#000000" opacity="0.82"></a-plane>
          <a-entity id="feedbackText" position="0 0 0.04"></a-entity>
        </a-entity>
      </a-entity>

      <!-- Panell final -->
      <a-entity id="finalPanel" position="0 1.35 -3.5" visible="false">
        <a-plane width="4.3" height="2.8" color="#000000" opacity="0.93"></a-plane>
        <a-entity id="finalText" position="0 0.15 0.04"></a-entity>
      </a-entity>

      <!-- Càmera i controls -->
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 1.6 0">
          <a-cursor
            id="gazeCursor"
            raycaster="objects: .clickable"
            fuse="false"
            material="color: white; shader: flat"
            geometry="primitive: ring; radiusInner: 0.006; radiusOuter: 0.010"
          ></a-cursor>
        </a-entity>

        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>

        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
