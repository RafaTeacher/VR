<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz 3D tipus Kahoot</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script>
      AFRAME.registerComponent("clickable", {
        init: function () {
          this.el.classList.add("clickable");
        }
      });

      window.addEventListener("load", () => {
        const FONT_URL =
          "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-400-normal.woff";

        const loadingPanelEl = document.querySelector("#loadingPanel");
        const loadingTextEl = document.querySelector("#loadingText");

        const modelEl = document.querySelector("#modelEntity");
        const questionEl = document.querySelector("#questionText");
        const progressEl = document.querySelector("#progressText");
        const answersEl = document.querySelector("#answers");
        const hintPanelEl = document.querySelector("#hintPanel");
        const hintTextEl = document.querySelector("#hintText");
        const feedbackPanelEl = document.querySelector("#feedbackPanel");
        const feedbackTextEl = document.querySelector("#feedbackText");
        const finalPanelEl = document.querySelector("#finalPanel");
        const finalTextEl = document.querySelector("#finalText");
        const stageEl = document.querySelector("#mainStage");
        const modelWarningEl = document.querySelector("#modelWarningText");

        let objects = [];
        let currentIndex = 0;
        let startTimeMs = 0;
        let questionStartMs = 0;
        let totalWrong = 0;
        let totalAttempts = 0;
        let locked = false;

        function setTroika(el, value, extra = {}) {
          el.setAttribute("troika-text", Object.assign({
            value,
            color: "#ffffff",
            font: FONT_URL
          }, extra));
        }

        function setLoadingText(value) {
          setTroika(loadingTextEl, value, {
            align: "center",
            anchor: "center",
            fontSize: 0.12,
            maxWidth: 3.8,
            lineHeight: 1.2,
            color: "#ffffff"
          });
        }

        function clearChildren(el) {
          while (el.firstChild) el.removeChild(el.firstChild);
        }

        function formatTime(ms) {
          const totalSeconds = Math.max(0, Math.round(ms / 1000));
          const min = Math.floor(totalSeconds / 60);
          const sec = totalSeconds % 60;
          return `${min}:${String(sec).padStart(2, "0")}`;
        }

        function updateProgress() {
          const total = objects.length;
          setTroika(
            progressEl,
            `Pregunta ${Math.min(currentIndex + 1, total)} / ${total} · Errades: ${totalWrong}`,
            {
              align: "center",
              anchor: "center",
              fontSize: 0.07,
              maxWidth: 3.8,
              color: "#cfcfcf"
            }
          );
        }

        function hideHint() {
          hintPanelEl.setAttribute("visible", "false");
          setTroika(hintTextEl, "", {
            align: "center",
            anchor: "center",
            fontSize: 0.075,
            maxWidth: 3.9
          });
        }

        function showHint(text) {
          setTroika(hintTextEl, text, {
            align: "center",
            anchor: "center",
            fontSize: 0.075,
            maxWidth: 3.95,
            lineHeight: 1.15,
            color: "#ffefb0"
          });
          hintPanelEl.setAttribute("visible", "true");
        }

        function hideFeedback() {
          feedbackPanelEl.setAttribute("visible", "false");
        }

        function showFeedback(text, color = "#74ff7a", duration = 1400) {
          setTroika(feedbackTextEl, text, {
            align: "center",
            anchor: "center",
            fontSize: 0.105,
            maxWidth: 2.3,
            color
          });
          feedbackPanelEl.setAttribute("visible", "true");
          feedbackPanelEl.removeAttribute("animation__pop");
          feedbackPanelEl.setAttribute(
            "animation__pop",
            "property: scale; from: 0.85 0.85 0.85; to: 1 1 1; dur: 220; easing: easeOutBack"
          );

          if (duration > 0) {
            setTimeout(() => {
              if (!locked) hideFeedback();
            }, duration);
          }
        }

        function setModelWarning(value) {
          setTroika(modelWarningEl, value, {
            align: "center",
            anchor: "center",
            fontSize: 0.07,
            maxWidth: 3.9,
            color: "#ffcc80"
          });
        }

        function createTextOnButton(btn, text, fontSize = 0.092) {
          const textEl = document.createElement("a-entity");
          textEl.setAttribute("position", "0 0 0.03");
          setTroika(textEl, text, {
            align: "center",
            anchor: "center",
            fontSize,
            maxWidth: 1.75,
            lineHeight: 1.08,
            color: "#ffffff"
          });
          btn.appendChild(textEl);
        }

        function makeAnswerButton(text, index, x, y, color) {
          const btn = document.createElement("a-plane");
          btn.setAttribute("position", `${x} ${y} 0.05`);
          btn.setAttribute("width", "2.00");
          btn.setAttribute("height", "0.46");
          btn.setAttribute("color", color);
          btn.setAttribute("opacity", "0.98");
          btn.setAttribute("clickable", "");
          btn.classList.add("answer-button");

          createTextOnButton(btn, `${index + 1}. ${text}`, 0.092);

          const handler = () => answer(index);
          btn.addEventListener("click", handler);
          btn.addEventListener("mouseup", handler);

          return btn;
        }

        function createAnswers(obj) {
          clearChildren(answersEl);

          const answers = (obj.answers || []).slice(0, 4);
          const positions = [
            { x: -1.05, y:  0.26, color: "#c62828" },
            { x:  1.05, y:  0.26, color: "#1565c0" },
            { x: -1.05, y: -0.26, color: "#2e7d32" },
            { x:  1.05, y: -0.26, color: "#ef6c00" }
          ];

          answers.forEach((txt, i) => {
            const p = positions[i];
            answersEl.appendChild(makeAnswerButton(txt, i, p.x, p.y, p.color));
          });
        }

        async function preloadModel(url, index, total) {
          // Precarrega el fitxer perquè després el canvi de pregunta sigui més fluid.
          // Si el servidor no permet cachejar-lo, el joc igualment continuarà.
          setLoadingText(`Carregant models 3D...\n${index + 1} / ${total}\n${url}`);
          try {
            const response = await fetch(url, { cache: "force-cache" });
            if (!response.ok) {
              console.warn("No s'ha pogut precarregar:", url, response.status);
            } else {
              await response.arrayBuffer();
            }
          } catch (err) {
            console.warn("Error de precàrrega:", url, err);
          }
        }

        async function preloadAllModels() {
          setLoadingText(`Carregant models 3D...\n0 / ${objects.length}`);

          for (let i = 0; i < objects.length; i++) {
            await preloadModel(objects[i].model, i, objects.length);
          }

          setLoadingText("Models preparats.\nComencem!");
          await new Promise((resolve) => setTimeout(resolve, 650));
        }

        function fitCurrentModel(obj) {
          /*
            Ajust automàtic:
            - centra el model perquè no quedi desplaçat fora de pantalla
            - iguala mides entre models diferents
            - evita que objecte2.glb / objecte3.glb quedin massa petits, massa grans o fora d'enquadrament
          */
          modelEl.object3D.updateMatrixWorld(true);

          const box = new THREE.Box3().setFromObject(modelEl.object3D);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxDim = Math.max(size.x, size.y, size.z);

          if (!isFinite(maxDim) || maxDim <= 0.0001) {
            setModelWarning("No s'ha pogut calcular la mida del model.");
            return;
          }

          const requestedScale = obj.scale || [1, 1, 1];
          const userScale = Math.max(requestedScale[0] || 1, requestedScale[1] || 1, requestedScale[2] || 1);

          // Mida objectiu una mica més gran, però dins del camp de visió.
          const targetMaxDim = 1.65;
          const uniformScale = (targetMaxDim / maxDim) * userScale;

          modelEl.object3D.scale.set(uniformScale, uniformScale, uniformScale);
          modelEl.object3D.position.set(
            -center.x * uniformScale,
            -center.y * uniformScale,
            -center.z * uniformScale
          );

          modelEl.object3D.updateMatrixWorld(true);
          setModelWarning("");
        }

        function calculateScore(totalTimeMs) {
          const totalQuestions = objects.length || 1;
          const errorPenalty = totalWrong * 10;
          const timePenalty = Math.floor(totalTimeMs / 20000);
          const score = Math.max(0, Math.min(100, 100 - errorPenalty - timePenalty));

          return {
            score,
            correct: totalQuestions,
            totalQuestions,
            errorPenalty,
            timePenalty
          };
        }

        function finishQuiz() {
          locked = true;
          const totalTimeMs = Date.now() - startTimeMs;
          const result = calculateScore(totalTimeMs);

          stageEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "true");

          setTroika(
            finalTextEl,
            [
              "ACTIVITAT COMPLETADA",
              "",
              `Puntuació: ${result.score} / 100`,
              `Temps total: ${formatTime(totalTimeMs)}`,
              `Encerts: ${result.correct} / ${result.totalQuestions}`,
              `Errades: ${totalWrong}`,
              `Intents totals: ${totalAttempts}`,
              "",
              `Penalització errades: -${result.errorPenalty}`,
              `Penalització temps: -${result.timePenalty}`,
              "",
              "Recarrega la pàgina per tornar a començar."
            ].join("\n"),
            {
              align: "center",
              anchor: "center",
              fontSize: 0.105,
              maxWidth: 3.8,
              lineHeight: 1.15,
              color: "#ffffff"
            }
          );
        }

        function answer(selectedIndex) {
          if (locked) return;

          const obj = objects[currentIndex];
          if (!obj) return;

          const correctIndex = Number(obj.correctIndex ?? 0);
          totalAttempts += 1;

          if (selectedIndex === correctIndex) {
            locked = true;
            hideHint();
            showFeedback("✓ RESPOSTA CORRECTA", "#74ff7a", 0);

            const currentRot = modelEl.getAttribute("rotation");
            modelEl.removeAttribute("animation__idle");
            modelEl.setAttribute(
              "animation__correct",
              `property: rotation; from: ${currentRot.x} ${currentRot.y} ${currentRot.z}; to: ${currentRot.x} ${currentRot.y + 360} ${currentRot.z}; dur: 1100; easing: easeOutQuad`
            );

            setTimeout(() => {
              currentIndex += 1;

              if (currentIndex >= objects.length) {
                finishQuiz();
              } else {
                loadQuestion(currentIndex);
              }
            }, 2200);
          } else {
            totalWrong += 1;
            updateProgress();

            showFeedback("✕ RESPOSTA INCORRECTA", "#ffb3b3", 1300);

            const hint = obj.hint
              ? `Pista: ${obj.hint}`
              : "Pista: observa millor la figura i torna-ho a provar.";

            showHint(hint);
          }
        }

        function loadQuestion(index) {
          locked = false;
          hideHint();
          hideFeedback();

          const obj = objects[index];
          if (!obj) return;

          setModelWarning("Carregant model...");
          modelEl.setAttribute("visible", "false");
          modelEl.removeAttribute("animation__correct");
          modelEl.removeAttribute("animation__idle");
          modelEl.removeAttribute("gltf-model");

          // Reiniciem transformacions abans de carregar.
          modelEl.object3D.position.set(0, 0, 0);
          modelEl.object3D.scale.set(1, 1, 1);
          modelEl.object3D.rotation.set(0, 0, 0);

          modelEl.setAttribute("rotation", (obj.rotation || [0, 0, 0]).join(" "));

          // Carrega directament la ruta del JSON.
          // Això evita problemes si un asset-id no queda ben resolt.
          modelEl.setAttribute("gltf-model", `url(${obj.model})`);

          const onLoaded = () => {
            modelEl.removeEventListener("model-loaded", onLoaded);
            modelEl.removeEventListener("model-error", onError);

            fitCurrentModel(obj);
            modelEl.setAttribute("visible", "true");

            modelEl.setAttribute(
              "animation__idle",
              "property: rotation; dur: 18000; easing: linear; loop: true; to: 0 360 0"
            );
          };

          const onError = () => {
            modelEl.removeEventListener("model-loaded", onLoaded);
            modelEl.removeEventListener("model-error", onError);
            modelEl.setAttribute("visible", "false");
            setModelWarning(`No es pot carregar el model:\n${obj.model}`);
          };

          modelEl.addEventListener("model-loaded", onLoaded);
          modelEl.addEventListener("model-error", onError);

          setTroika(
            questionEl,
            obj.question || "",
            {
              align: "center",
              anchor: "center",
              fontSize: 0.105,
              maxWidth: 4.05,
              lineHeight: 1.1,
              color: "#ffffff"
            }
          );

          createAnswers(obj);
          updateProgress();
          questionStartMs = Date.now();
        }

        async function loadData() {
          stageEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "false");
          loadingPanelEl.setAttribute("visible", "true");
          setLoadingText("Preparant l'activitat...");

          const listResp = await fetch("data/objects.json");
          if (!listResp.ok) throw new Error("No puc llegir data/objects.json");

          const fileList = await listResp.json();
          const loaded = [];

          for (const file of fileList) {
            const resp = await fetch(`data/${file}`);
            if (!resp.ok) throw new Error(`No puc llegir data/${file}`);
            loaded.push(await resp.json());
          }

          objects = loaded.map((o, i) => ({
            id: o.id ?? `obj${String(i + 1).padStart(2, "0")}`,
            model: o.model,
            rotation: o.rotation ?? [0, 0, 0],
            scale: o.scale ?? [1, 1, 1],
            question: o.question ?? "",
            answers: o.answers ?? [],
            correctIndex: o.correctIndex ?? 0,
            hint: o.hint ?? ""
          }));

          await preloadAllModels();

          loadingPanelEl.setAttribute("visible", "false");
          stageEl.setAttribute("visible", "true");

          startTimeMs = Date.now();
          currentIndex = 0;
          totalWrong = 0;
          totalAttempts = 0;

          loadQuestion(0);
        }

        loadData().catch((err) => {
          console.error(err);
          loadingPanelEl.setAttribute("visible", "false");
          finalPanelEl.setAttribute("visible", "true");
          setTroika(
            finalTextEl,
            "Error carregant dades.\nRevisa data/objects.json i els fitxers objXX.json.",
            {
              align: "center",
              anchor: "center",
              fontSize: 0.115,
              maxWidth: 3.8,
              color: "#ffffff"
            }
          );
        });
      });
    </script>
  </head>

  <body>
    <a-scene background="color: #111111">
      <a-assets timeout="30000"></a-assets>

      <a-entity light="type: ambient; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; intensity: 1.0" position="0 4 2"></a-entity>

      <!-- Pantalla inicial de precàrrega -->
      <a-entity id="loadingPanel" position="0 1.45 -3.8" visible="true">
        <a-plane width="4.2" height="1.5" color="#000000" opacity="0.92"></a-plane>
        <a-entity id="loadingText" position="0 0 0.04"></a-entity>
      </a-entity>

      <!-- Escenari principal.
           Més lluny que abans perquè tot entri millor al camp de visió. -->
      <a-entity id="mainStage" position="0 0 -5.2" visible="false">

        <!-- Objecte més amunt però amb mida automàtica per evitar que quedi fora de pantalla -->
        <a-entity id="modelArea" position="0 2.55 0">
          <a-entity id="modelEntity" visible="false" position="0 0 0"></a-entity>

          <a-torus
            position="0 -0.92 0"
            rotation="90 0 0"
            radius="1.05"
            radius-tubular="0.010"
            color="#ffd54a"
            opacity="0.85"
            animation__pulse="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dir: alternate; dur: 850; loop: true; easing: easeInOutSine"
          ></a-torus>

          <a-entity id="modelWarningText" position="0 -1.22 0.03"></a-entity>
        </a-entity>

        <!-- Panell principal més compacte i més amunt -->
        <a-entity id="quizPanel" position="0 0.05 0">
          <a-plane width="4.55" height="2.05" color="#000000" opacity="0.90"></a-plane>

          <a-entity id="progressText" position="0 0.84 0.03"></a-entity>
          <a-entity id="questionText" position="0 0.48 0.03"></a-entity>

          <a-entity id="answers" position="0 -0.38 0.03"></a-entity>
        </a-entity>

        <!-- Pista separada, però més propera als botons -->
        <a-entity id="hintPanel" position="0 -1.22 0" visible="false">
          <a-plane width="4.55" height="0.36" color="#3a2200" opacity="0.95"></a-plane>
          <a-entity id="hintText" position="0 0 0.03"></a-entity>
        </a-entity>

        <!-- Feedback situat entre objecte i pregunta -->
        <a-entity id="feedbackPanel" position="0 1.47 0.05" visible="false">
          <a-plane width="2.8" height="0.46" color="#000000" opacity="0.84"></a-plane>
          <a-entity id="feedbackText" position="0 0 0.04"></a-entity>
        </a-entity>
      </a-entity>

      <!-- Panell final -->
      <a-entity id="finalPanel" position="0 1.35 -4.2" visible="false">
        <a-plane width="4.25" height="2.55" color="#000000" opacity="0.93"></a-plane>
        <a-entity id="finalText" position="0 0.10 0.04"></a-entity>
      </a-entity>

      <!-- Càmera i controls -->
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 1.6 0">
          <a-cursor
            id="gazeCursor"
            raycaster="objects: .clickable"
            fuse="false"
            material="color: white; shader: flat"
            geometry="primitive: ring; radiusInner: 0.006; radiusOuter: 0.010"
          ></a-cursor>
        </a-entity>

        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>

        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 30"
          cursor="rayOrigin: entity; fuse: false"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
